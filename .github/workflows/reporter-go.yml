name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        run: |
          set -e
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            go build -v -trimpath -ldflags="-s -w" -o waken-wa-reporter.exe .
          else
            go build -v -trimpath -ldflags="-s -w" -o waken-wa-reporter .
            chmod +x waken-wa-reporter
            zip -q waken-wa-reporter-macos.zip waken-wa-reporter
          fi

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path waken-wa-reporter.exe -DestinationPath waken-wa-reporter-windows-amd64.zip -Force

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: waken-wa-reporter-windows-amd64
          path: |
            waken-wa-reporter.exe
            waken-wa-reporter-windows-amd64.zip
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: waken-wa-reporter-macos
          path: |
            waken-wa-reporter
            waken-wa-reporter-macos.zip
          if-no-files-found: error
