name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        run: |
          set -e
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            go build -v -o waken-wa-reporter.exe .
          else
            go build -v -o waken-wa-reporter .
          fi
